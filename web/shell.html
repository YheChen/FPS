<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FPS</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0e1216;
    color: #cfd6dd;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #wrap { display: flex; flex-direction: column; height: 100%; }
  #canvas {
    flex: 1 1 auto;
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
    outline: none;
    background: #0e1216;
  }
  #status {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #8a94a0;
    pointer-events: none;
  }
  #hint {
    position: fixed;
    bottom: 8px;
    left: 8px;
    font-size: 12px;
    color: #5c6570;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
</div>
<div id="status">Loading…</div>
<div id="hint">WASD move · mouse look (click to lock) · click fire · R reload · Tab scores</div>
<script type="text/javascript">
  var statusEl = document.getElementById('status');
  var Module = {
    canvas: (function () {
      var c = document.getElementById('canvas');
      c.addEventListener('webglcontextlost', function (e) {
        alert('WebGL context lost. Reload the page.');
        e.preventDefault();
      }, false);
      return c;
    })(),
    setStatus: function (text) {
      if (statusEl) { statusEl.textContent = text; statusEl.style.display = text ? 'block' : 'none'; }
    },
    print: function (text) { console.log(text); },
    printErr: function (text) { console.error(text); },
    onRuntimeInitialized: function () { Module.setStatus(''); },
  };
  Module.setStatus('Downloading…');
</script>
{{{ SCRIPT }}}
</body>
</html>
